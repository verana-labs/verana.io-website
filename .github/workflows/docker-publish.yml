name: CI / Docker Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  DOCKER_HUB_NAMESPACE: veranalabs
  IMAGE_NAME: verana.io-website

jobs:
  # ---------------------------------------------------------------------------
  # Build + type-check on every push and PR.
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ---------------------------------------------------------------------------
  # Build + push the Docker image to Docker Hub on pushes to main and tags.
  # ---------------------------------------------------------------------------
  docker:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKER_HUB_LOGIN }}
          password: ${{ secrets.DOCKER_HUB_PWD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.DOCKER_HUB_NAMESPACE }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile
          target: runner
          # amd64 only: the OVH cluster is x86_64.
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Deploy to Kubernetes (OVH) on push to main only.
  # ---------------------------------------------------------------------------
  deploy:
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@776406bce94f63e41d621b960d78ee25c8b76ede # v4

      - name: Deploy
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_2060_PROD }}
          RELATICLE_API_TOKEN: ${{ secrets.RELATICLE_API_TOKEN }}
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
        run: |
          echo "$KUBECONFIG_DATA" > /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig
          # Upsert the app secret from GitHub Actions secrets. Idempotent.
          kubectl -n web create secret generic verana-io-website-secrets \
            --from-literal=RELATICLE_API_TOKEN="${RELATICLE_API_TOKEN}" \
            --from-literal=ALERT_WEBHOOK_URL="${ALERT_WEBHOOK_URL}" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f k8s/
          # imagePullPolicy: Always + restart => new pods repull the :latest tag.
          kubectl -n web rollout restart deployment/verana-io-website
          kubectl -n web rollout status deployment/verana-io-website --timeout=120s
