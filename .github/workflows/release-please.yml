name: Release Please

# Opens/maintains a release PR from Conventional Commits on `main`. When the
# release PR is merged, release-please creates a GitHub release and a `v*` git
# tag, which docker-publish.yml picks up to build and push the versioned image.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      notify_tag:
        description: "Release tag to (re)announce on Discord, e.g. v1.2.0"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  discord-notify:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    uses: 2060-io/organization/.github/workflows/discord-release-notify-call.yml@d199fdc55832f78f90158117a93d227709ca2746 # main
    with:
      tag_name: ${{ needs.release-please.outputs.tag_name }}
    secrets:
      DISCORD_UPDATES_WEBHOOK_URL: ${{ secrets.DISCORD_UPDATES_WEBHOOK_URL }}

  discord-notify-manual:
    if: github.event_name == 'workflow_dispatch'
    uses: 2060-io/organization/.github/workflows/discord-release-notify-call.yml@d199fdc55832f78f90158117a93d227709ca2746 # main
    with:
      tag_name: ${{ inputs.notify_tag }}
    secrets:
      DISCORD_UPDATES_WEBHOOK_URL: ${{ secrets.DISCORD_UPDATES_WEBHOOK_URL }}
