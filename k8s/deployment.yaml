apiVersion: apps/v1
kind: Deployment
metadata:
  name: verana-io-website
  namespace: web
  labels:
    app.kubernetes.io/name: verana-io-website
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: verana-io-website
  template:
    metadata:
      labels:
        app.kubernetes.io/name: verana-io-website
    spec:
      containers:
        - name: web
          image: veranalabs/verana.io-website:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: RELATICLE_API_URL
              valueFrom:
                secretKeyRef:
                  name: verana-io-website-secrets
                  key: RELATICLE_API_URL
                  optional: true
            - name: RELATICLE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: verana-io-website-secrets
                  key: RELATICLE_API_TOKEN
                  optional: true
            - name: ALERT_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: verana-io-website-secrets
                  key: ALERT_WEBHOOK_URL
                  optional: true
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
